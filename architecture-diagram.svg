<svg viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="520" fill="#ffffff"/>

  <text x="20" y="30" font-size="20" font-weight="bold" fill="#1a1a1a">Live Review Intelligence Pipeline — Architecture</text>

  <!-- Row 1: Ingestion -->
  <rect x="20" y="70" width="180" height="70" rx="8" fill="#fdf3e7" stroke="#d99a2b" stroke-width="1.5"/>
  <text x="110" y="98" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Demo Website</text>
  <text x="110" y="116" font-size="11" text-anchor="middle" fill="#555">review submitted</text>

  <line x1="200" y1="105" x2="250" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="70" width="180" height="70" rx="8" fill="#eaf2fd" stroke="#3b73c9" stroke-width="1.5"/>
  <text x="340" y="98" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">n8n Webhook</text>
  <text x="340" y="116" font-size="11" text-anchor="middle" fill="#555">instant trigger</text>

  <line x1="430" y1="105" x2="480" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="70" width="180" height="70" rx="8" fill="#eefaf0" stroke="#2f8f4f" stroke-width="1.5"/>
  <text x="570" y="93" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Classify Review</text>
  <text x="570" y="109" font-size="11" text-anchor="middle" fill="#555">Groq · Llama 3.3 70B</text>
  <text x="570" y="124" font-size="10" text-anchor="middle" fill="#888">sentiment + theme</text>

  <line x1="660" y1="105" x2="710" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="710" y="70" width="200" height="70" rx="8" fill="#eafbf7" stroke="#1e8f7a" stroke-width="1.5"/>
  <text x="810" y="98" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Reviews Log</text>
  <text x="810" y="116" font-size="11" text-anchor="middle" fill="#555">Google Sheets · append</text>

  <!-- down arrow to row 2 -->
  <line x1="810" y1="140" x2="810" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: aggregation & intelligence, right to left -->
  <rect x="710" y="190" width="200" height="70" rx="8" fill="#eafbf7" stroke="#1e8f7a" stroke-width="1.5"/>
  <text x="810" y="218" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Read All Reviews</text>
  <text x="810" y="236" font-size="11" text-anchor="middle" fill="#555">full history, every run</text>

  <line x1="710" y1="225" x2="660" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="190" width="180" height="70" rx="8" fill="#fdf0f5" stroke="#c93b73" stroke-width="1.5"/>
  <text x="570" y="213" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rank By Impact</text>
  <text x="570" y="229" font-size="10" text-anchor="middle" fill="#555">40% volume +</text>
  <text x="570" y="243" font-size="10" text-anchor="middle" fill="#555">60% negative-sentiment share</text>

  <line x1="480" y1="225" x2="430" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="190" width="180" height="70" rx="8" fill="#eefaf0" stroke="#2f8f4f" stroke-width="1.5"/>
  <text x="340" y="213" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Recommendations</text>
  <text x="340" y="229" font-size="11" text-anchor="middle" fill="#555">Groq · top 3 themes</text>
  <text x="340" y="244" font-size="10" text-anchor="middle" fill="#888">1 action each + summary</text>

  <line x1="250" y1="225" x2="200" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="20" y="190" width="180" height="70" rx="8" fill="#fff4e8" stroke="#c9701e" stroke-width="1.5"/>
  <text x="110" y="213" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">QA Gate</text>
  <text x="110" y="229" font-size="10" text-anchor="middle" fill="#555">rejects vague advice,</text>
  <text x="110" y="243" font-size="10" text-anchor="middle" fill="#555">checks full coverage</text>

  <!-- down to row 3 -->
  <line x1="110" y1="260" x2="110" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: branch -->
  <rect x="20" y="310" width="180" height="60" rx="8" fill="#eefaf0" stroke="#2f8f4f" stroke-width="1.5"/>
  <text x="110" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">PASS</text>
  <text x="110" y="352" font-size="10" text-anchor="middle" fill="#555">ready-to-publish rows</text>

  <rect x="20" y="385" width="180" height="60" rx="8" fill="#fdeeee" stroke="#c94b3b" stroke-width="1.5"/>
  <text x="110" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">FAIL</text>
  <text x="110" y="427" font-size="10" text-anchor="middle" fill="#555">flagged-for-review rows</text>

  <line x1="200" y1="340" x2="250" y2="375" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="415" x2="250" y2="385" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="360" width="150" height="60" rx="8" fill="#f1eefb" stroke="#6b4fc9" stroke-width="1.5"/>
  <text x="325" y="385" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Merge</text>
  <text x="325" y="401" font-size="10" text-anchor="middle" fill="#555">append</text>

  <line x1="400" y1="390" x2="450" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="450" y="360" width="220" height="60" rx="8" fill="#eafbf7" stroke="#1e8f7a" stroke-width="1.5"/>
  <text x="560" y="382" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Review Dashboard</text>
  <text x="560" y="399" font-size="10" text-anchor="middle" fill="#555">Google Sheets · one live row per theme</text>

  <line x1="670" y1="390" x2="720" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="720" y="360" width="180" height="60" rx="8" fill="#eaf2fd" stroke="#3b73c9" stroke-width="1.5"/>
  <text x="810" y="385" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Respond</text>
  <text x="810" y="401" font-size="10" text-anchor="middle" fill="#555">confirms to website</text>

  <text x="20" y="480" font-size="12" fill="#888">Every review round-trips end to end in under 30 seconds. Dashboard reflects live sentiment, ranked by business impact, not just volume.</text>
</svg>
